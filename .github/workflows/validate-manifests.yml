name: Validate K8s Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'k8s-manifests/**'
      - '.github/workflows/validate-manifests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'k8s-manifests/**'

jobs:
  validate:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up tools
        run: |
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          # Install kubeval
          mkdir -p /tmp/kubeval && cd /tmp/kubeval
          curl -L https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

          # Install kubesec
          mkdir -p /tmp/kubesec && cd /tmp/kubesec
          curl -L https://github.com/controlplaneio/kubesec/releases/latest/download/kubesec_linux_amd64.tar.gz | tar xz
          sudo mv kubesec /usr/local/bin/

          # Install kube-score
          mkdir -p /tmp/kube-score && cd /tmp/kube-score
          curl -L https://github.com/zegl/kube-score/releases/latest/download/kube-score_linux_amd64.tar.gz | tar xz
          sudo mv kube-score /usr/local/bin/

      - name: Validate all overlays
        run: |
          # Discover all overlays under k8s-manifests/*/overlays/*
          overlays=$(find k8s-manifests/*/overlays -mindepth 1 -maxdepth 1 -type d | sort)

          if [ -z "$overlays" ]; then
            echo "No overlays found — nothing to validate."
            exit 0
          fi

          for overlay in $overlays; do
            echo ""
            echo "════════════════════════════════════════"
            echo "Overlay: $overlay"
            echo "════════════════════════════════════════"

            manifest="/tmp/$(echo $overlay | tr '/' '-').yaml"

            echo "--- Build ---"
            kustomize build "$overlay" > "$manifest"
            echo "✓ Built successfully"

            echo "--- Schema validation (kubeval) ---"
            kubeval "$manifest"
            echo "✓ Schema valid"

            echo "--- Security scan (kubesec) ---"
            kubesec scan "$manifest" || true

            echo "--- Best practices (kube-score) ---"
            kube-score score "$manifest" || true
          done
