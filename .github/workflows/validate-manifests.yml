name: Validate K8s Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'k8s-manifests/**'
      - '.github/workflows/validate-manifests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'k8s-manifests/**'

jobs:
  validate:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up tools
        env:
          KUSTOMIZE_VERSION: v5.8.1
          KUBEVAL_VERSION: v0.16.1
          KUBESEC_VERSION: v2.14.2
          KUBE_SCORE_VERSION: v1.20.0
        run: |
          # Install kustomize
          mkdir -p /tmp/kustomize && cd /tmp/kustomize
          curl -L https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/

          # Install kubeval
          mkdir -p /tmp/kubeval && cd /tmp/kubeval
          curl -L https://github.com/instrumenta/kubeval/releases/download/${KUBEVAL_VERSION}/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

          # Install kubesec
          mkdir -p /tmp/kubesec && cd /tmp/kubesec
          curl -L https://github.com/controlplaneio/kubesec/releases/download/${KUBESEC_VERSION}/kubesec_linux_amd64.tar.gz | tar xz
          sudo mv kubesec /usr/local/bin/

          # Install kube-score
          mkdir -p /tmp/kube-score && cd /tmp/kube-score
          curl -L https://github.com/zegl/kube-score/releases/download/${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION#v}_linux_amd64.tar.gz | tar xz
          sudo mv kube-score /usr/local/bin/

      - name: Validate all overlays
        run: |
          # Discover all overlays under k8s-manifests/*/overlays/*
          overlays=$(find k8s-manifests/*/overlays -mindepth 1 -maxdepth 1 -type d | sort)

          if [ -z "$overlays" ]; then
            echo "No overlays found — nothing to validate."
            exit 0
          fi

          for overlay in $overlays; do
            echo ""
            echo "════════════════════════════════════════"
            echo "Overlay: $overlay"
            echo "════════════════════════════════════════"

            manifest="/tmp/$(echo $overlay | tr '/' '-').yaml"

            echo "--- Build ---"
            # Create stubs for secret files that exist on disk at deploy time but are not committed
            stub_files=()
            if grep -q "application.properties" "$overlay/kustomization.yaml" 2>/dev/null; then
              touch "$overlay/application.properties"
              stub_files+=("$overlay/application.properties")
            fi

            kustomize build "$overlay" > "$manifest"

            # Remove stubs
            for stub in "${stub_files[@]}"; do rm -f "$stub"; done

            echo "✓ Built successfully"

            echo "--- Schema validation (kubeval) ---"
            kubeval "$manifest"
            echo "✓ Schema valid"

            echo "--- Security scan (kubesec) ---"
            kubesec scan "$manifest" || true

            echo "--- Best practices (kube-score) ---"
            kube-score score "$manifest" || true
          done
