apiVersion: apps/v1
kind: Deployment
metadata:
  name: eva-seqcol
  labels:
    app: eva-seqcol
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: eva-seqcol
  template:
    metadata:
      labels:
        app: eva-seqcol
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      imagePullSecrets:
      - name: regcred

      containers:
      - name: eva-seqcol
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          protocol: TCP

        env:
        # JVM tuning for containers
        - name: JAVA_OPTS
          value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

        # Service info file path
        - name: SERVICE_INFO_FILE_PATH
          value: "/app/service-info.json"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /eva/webservices/seqcol/health
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /eva/webservices/seqcol/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: config-volume
          mountPath: /app/config
          readOnly: true

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: config-volume
        secret:
          secretName: eva-seqcol-config
          items:
          - key: application.properties
            path: application.properties
          defaultMode: 0444

      # Spread pods across nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: eva-seqcol
              topologyKey: kubernetes.io/hostname
