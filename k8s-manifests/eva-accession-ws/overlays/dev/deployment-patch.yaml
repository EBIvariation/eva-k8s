apiVersion: apps/v1
kind: Deployment
metadata:
  name: eva-accession-ws
spec:
  replicas: 1  # Single replica for development
  template:
    spec:
      containers:
      - name: eva-accession-ws
        image: dockerhub.ebi.ac.uk/ebivariation/eva-accession
        imagePullPolicy: Always
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
