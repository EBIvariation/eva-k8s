accessioning.instanceId=rest-instance

accessioning.submitted.categoryId=ss
accessioning.monotonic.ss.blockSize=100000
accessioning.monotonic.ss.blockStartValue=5000000000
accessioning.monotonic.ss.nextBlockInterval=1000000000

accessioning.clustered.categoryId=rs
accessioning.monotonic.rs.blockSize=100000
accessioning.monotonic.rs.blockStartValue=3000000000
accessioning.monotonic.rs.nextBlockInterval=1000000000

spring.data.mongodb.uri=mongodb://mongo_user:mongo_pass@mongodb:27017/admin
spring.data.mongodb.database=eva_accession_sharded
mongodb.read-preference=primaryPreferred

human.mongodb.uri=mongodb://mongo_user:mongo_pass@mongodb:27017/admin
human.mongodb.database=eva_accession_human_sharded

continuous.id.blocks.datasource.driver-class-name=org.postgresql.Driver
continuous.id.blocks.datasource.jdbc-url=jdbc:postgresql://postgres:5432/continuous_id_blocks_db
continuous.id.blocks.datasource.username=continuous_id_blocks_user
continuous.id.blocks.datasource.password=continuous_id_blocks_pass

contig-alias.url=https://localhost:8080/contig-alias

eva.api.base-url=http://localhost

parameters.mongodb.writeConcern=ACKNOWLEDGED

management.endpoints.web.exposure.include=info,health
management.info.git.mode=simple

# Base URL used to build safe redirect responses (must not end with a slash).
# Set this to the canonical public URL of the API in each deployment environment.

# See https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-2.1-Release-Notes#bean-overriding
spring.main.allow-bean-definition-overriding=true

management.metrics.binders.jvm.enabled=false

