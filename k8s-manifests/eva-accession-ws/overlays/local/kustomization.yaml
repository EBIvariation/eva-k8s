apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eva-accession-ws-local

resources:
- namespace.yaml
- postgres.yaml
- mongodb.yaml
- ../../base

# Patch the base deployment for local testing
patches:
- path: deployment-patch.yaml
- path: service-patch.yaml
# Skip ingress and base secrets for local testing
- target:
    group: networking.k8s.io
    version: v1
    kind: Ingress
    name: eva-accession-ws
  patch: |
    - op: replace
      path: /spec/rules/0/host
      value: localhost

# Use local image
images:
- name: ebivariation/eva-accession-ws
  newName: eva-accession-ws
  newTag: local

# Generate secret with application.properties for local testing
secretGenerator:
- name: eva-accession-ws-config
  files:
  - application.properties
