# Database configuration for local Kubernetes testing
spring.datasource.url=jdbc:postgresql://postgres:5432/contigalias_db
spring.datasource.username=contigalias_user
spring.datasource.password=contigalias_password

# Admin credentials
controller.auth.admin.username=admin
controller.auth.admin.password=admin123

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# FTP proxy disabled for local testing
ftp.proxy.host=null
ftp.proxy.port=0

# Scaffolds
config.scaffolds.enabled=true
