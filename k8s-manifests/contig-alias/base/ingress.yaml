apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contig-alias
  labels:
    app: contig-alias
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
  - host: contig-alias.example.com  # Replace with your hostname in overlays
    http:
      paths:
      - path: /eva/webservices/contig-alias
        pathType: Prefix
        backend:
          service:
            name: contig-alias
            port:
              number: 8080
